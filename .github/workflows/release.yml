# Reusable release workflow (semver or calver).
#
# Cuts a v* tag + GitHub release for the calling repo. If HEAD is already the
# latest released commit (nothing new to ship) it no-ops instead of cutting an
# empty release — pass force=true to release anyway. Deployment is intentionally
# NOT included here: the caller chains its own deploy job gated on the
# `should_release` output, so this stays deploy-target agnostic.
#
# Versioning scheme (default semver):
#   - semver: vMAJOR.MINOR.PATCH, auto-bumps the patch of the latest semver tag.
#   - calver: vYYYYMMDD for the first release of the day, then vYYYYMMDD.1,
#             vYYYYMMDD.2, … for further same-day releases.
# Select per call via the `version_scheme` input, or repo-wide by setting the
# `VERSION_SCHEME` repo/org variable to "calver". Input wins over the variable.
# The two schemes filter tags by shape, so they never pollute each other's
# "latest tag" lookup if a repo ever switches.
#
# Usage (in a consumer repo's .github/workflows/release.yml):
#
#   on:
#     workflow_dispatch:
#       inputs:
#         version: { type: string, required: false }
#         force:   { type: boolean, default: false }
#   jobs:
#     release:
#       uses: cogx-sol/ci/.github/workflows/release.yml@v1
#       with:
#         version: ${{ inputs.version }}
#         force: ${{ inputs.force }}
#         # version_scheme: calver   # or leave unset for semver / use VERSION_SCHEME var
#     deploy:
#       needs: release
#       if: needs.release.outputs.should_release == 'true'
#       ...  # your deploy job (e.g. the swa-deploy composite action)
name: Release (reusable)

on:
  workflow_call:
    inputs:
      version:
        description: 'Explicit version (e.g. 1.4.0 or 20260621.1). Empty = derive from version_scheme.'
        required: false
        type: string
      version_scheme:
        description: "Versioning scheme: 'semver' or 'calver'. Empty falls back to the VERSION_SCHEME repo variable, then 'semver'."
        required: false
        type: string
        default: ''
      force:
        description: 'Release even if there are no new commits since the last release.'
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: 'Released version (no leading v). Empty when skipped.'
        value: ${{ jobs.tag-release.outputs.version }}
      should_release:
        description: "'true' if a release was cut, 'false' if skipped (no changes)."
        value: ${{ jobs.tag-release.outputs.should_release }}

permissions:
  contents: write   # push tags + create the GitHub release

# Serialize releases per calling repo so two dispatches can't race on tag
# creation. Queue rather than cancel — cancelling mid-tag-push is worse than
# waiting.
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  tag-release:
    name: Create release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SCHEME: ${{ inputs.version_scheme }}
          VAR_SCHEME: ${{ vars.VERSION_SCHEME }}
          FORCE: ${{ inputs.force }}
        # Logic lives in scripts/next-version.sh so it's unit-tested in CI
        # (scripts/next-version.test.sh) rather than only exercisable by dispatch.
        # It prints should_release / version / scheme as GITHUB_OUTPUT lines.
        run: bash scripts/next-version.sh >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true

      # Advance the moving major tag (v1 -> latest v1.x.y) so consumers pinned at
      # `@v1` actually receive new releases. semver only — `major` is emitted by
      # next-version.sh just for the semver scheme, so this is skipped under calver.
      - name: Advance moving major tag
        if: steps.version.outputs.should_release == 'true' && steps.version.outputs.major != ''
        env:
          MAJOR: ${{ steps.version.outputs.major }}
        run: |
          set -euo pipefail
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push -f origin "refs/tags/${MAJOR}"
